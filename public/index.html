    <link rel="icon" type="image/png" href="/Images/Avatar/Fav2.png" />
    <meta name="theme-color" content="#001F3F" />

      name="description"

      rel="preload"
      href="/fonts/Inter.woff2"
      as="font"
      type="font/woff2"

    />
    <link
      rel="preload"

      as="font"
      type="font/woff2"

    />
